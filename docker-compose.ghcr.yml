# Compose override for deploying pre-built images from GHCR instead of
# building locally. Use like:
#
#   export IMAGE_OWNER=your-github-user-or-org   # lowercase
#   export IMAGE_TAG=latest                       # or sha-xxxx, or v1.2.3
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml pull
#   docker compose -f docker-compose.yml -f docker-compose.ghcr.yml up -d
#
# IMAGE_OWNER must be the lowercased github owner/org — the build workflow
# publishes to ghcr.io/<owner>/<repo>-<service>. IMAGE_REPO defaults to the
# repo name used at publish time.
#
# Run `docker compose pull` (not `build`) and the image tags below take
# precedence over the build contexts declared in docker-compose.yml.

services:
  server:
    image: ghcr.io/sverredraaisma/proof-of-concept-age-verification-server:latest
    pull_policy: always

  provider-web:
    image: ghcr.io/sverredraaisma/proof-of-concept-age-verification-provider-web:latest
    pull_policy: always

  consumer-web:
    image: ghcr.io/sverredraaisma/proof-of-concept-age-verification-consumer-web:latest
    pull_policy: always
